services:
  # Interactive CLI (default)
  arena:
    build: .
    volumes:
      - .:/workspace/gpgpu-arena
      - kernel-cache:/workspace/gpgpu-arena/build/kernels
    working_dir: /workspace/gpgpu-arena
    command: bash -c "mkdir -p build && cd build && cmake -DBUILD_GUI=OFF .. && make -j$$(nproc) && ./arena --tui"
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # GUI mode
  gui:
    build: .
    volumes:
      - .:/workspace/gpgpu-arena
      - kernel-cache:/workspace/gpgpu-arena/build/kernels
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /workspace/gpgpu-arena
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
      - __NV_PRIME_RENDER_OFFLOAD=1
    command: bash -c "mkdir -p build && cd build && cmake -DBUILD_GUI=ON .. && make -j$$(nproc) && ./arena --gui"
    stdin_open: true
    tty: true
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  kernel-cache:
